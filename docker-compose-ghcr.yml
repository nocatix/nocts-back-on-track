services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: back-on-track-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    env_file:
      - .env
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - back-on-track-network

  # Backend Server from ghcr.io
  backend:
    image: ghcr.io/nocatix/nocts-back-on-track-backend:latest
    container_name: back-on-track-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - back-on-track-network

  # Frontend from ghcr.io
  frontend:
    image: ghcr.io/nocatix/nocts-back-on-track-frontend:latest
    container_name: back-on-track-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - back-on-track-network

volumes:
  mongodb_data:

networks:
  back-on-track-network:
    driver: bridge
