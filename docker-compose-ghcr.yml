version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: back-on-track-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: tracker_user
      MONGO_INITDB_ROOT_PASSWORD: tracker_password
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Server from ghcr.io
  backend:
    image: ghcr.io/marcel/nocts-back-on-track-backend:latest
    container_name: back-on-track-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://tracker_user:tracker_password@mongodb:27017/addictionTracker?authSource=admin
      NODE_ENV: production
      PORT: 5000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - back-on-track-network

  # Frontend from ghcr.io
  frontend:
    image: ghcr.io/marcel/nocts-back-on-track-frontend:latest
    container_name: back-on-track-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - back-on-track-network

volumes:
  mongodb_data:

networks:
  back-on-track-network:
    driver: bridge
