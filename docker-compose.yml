services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: back-on-track-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    env_file:
      - .env
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: back-on-track-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy

  # Frontend Client
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        - REACT_APP_API_URL=http://localhost:5000
    container_name: back-on-track-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongodb_data:
    driver: local

networks:
  default:
    name: back-on-track-network
