name: Publish Mobile APK From Artifact

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to publish the APK for (e.g. v1.5.0)'
        required: true

jobs:
  publish-apk:
    if: github.actor == 'nocatix' && (github.event_name == 'workflow_dispatch' || github.event.release.draft == false)
    runs-on: ubuntu-latest
    name: Publish APK
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout code at release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.event.release.tag_name }}

      - name: Validate release tag format
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.event.release.tag_name }}"

          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            IS_PRERELEASE="true"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IS_PRERELEASE="false"
          else
            echo "Invalid tag: $TAG"
            echo "Expected format: vX.Y.Z or vX.Y.Z-beta.N"
            exit 1
          fi

      - name: Compute publish metadata
        id: meta
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          TAG_SHA=$(git rev-list -n 1 "$TAG")
          if [[ "$TAG" =~ -beta\. ]]; then
            IS_PRERELEASE="true"
            CHANNEL="beta"
          else
            IS_PRERELEASE="false"
            CHANNEL="release"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG}" >> "$GITHUB_OUTPUT"
          echo "tag_sha=${TAG_SHA}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=mobile-apk-${TAG_SHA}" >> "$GITHUB_OUTPUT"
          echo "apk_name=nocts-back-on-track-${CHANNEL}-${VERSION}.apk" >> "$GITHUB_OUTPUT"

      - name: Verify APK artifact exists for release commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG_SHA: ${{ steps.meta.outputs.tag_sha }}
          ARTIFACT_NAME: ${{ steps.meta.outputs.artifact_name }}
        run: |
          set -euo pipefail

          RUNS_URL="https://api.github.com/repos/${REPO}/actions/workflows/build-apk-artifact.yml/runs?head_sha=${TAG_SHA}&status=success&per_page=20"
          RUN_ID=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$RUNS_URL" \
            | jq -r --arg SHA "$TAG_SHA" '.workflow_runs[] | select(.head_sha == $SHA) | .id' \
            | head -n1)

          if [[ -z "${RUN_ID:-}" || "${RUN_ID}" == "null" ]]; then
            echo "No successful Build Mobile APK Artifact workflow run found for commit ${TAG_SHA}."
            echo "Run the Build Mobile APK Artifact workflow for this commit first, then re-run this release publish workflow."
            exit 1
          fi

          ARTIFACTS_URL="https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/artifacts?per_page=100"
          MATCH_COUNT=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$ARTIFACTS_URL" \
            | jq -r --arg NAME "$ARTIFACT_NAME" '[.artifacts[] | select(.name == $NAME and .expired == false)] | length')

          if [[ "$MATCH_COUNT" -eq 0 ]]; then
            echo "Artifact ${ARTIFACT_NAME} was not found (or has expired) for workflow run ${RUN_ID}."
            echo "Run Build Mobile APK Artifact on commit ${TAG_SHA} and ensure artifact retention has not expired."
            exit 1
          fi

          echo "Found artifact ${ARTIFACT_NAME} in run ${RUN_ID}."

      - name: Download APK artifact from main build workflow
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build-apk-artifact.yml
          commit: ${{ steps.meta.outputs.tag_sha }}
          name: ${{ steps.meta.outputs.artifact_name }}
          path: release-artifacts
          if_no_artifact_found: fail

      - name: Prepare APK filename for release channel
        run: |
          set -euo pipefail
          SRC="release-artifacts/app-release.apk"
          DST="release-artifacts/${{ steps.meta.outputs.apk_name }}"
          if [[ ! -f "$SRC" ]]; then
            echo "Downloaded artifact does not contain app-release.apk"
            echo "Expected artifact: ${{ steps.meta.outputs.artifact_name }}"
            exit 1
          fi
          cp "$SRC" "$DST"

      - name: Create stable latest APK alias
        if: steps.meta.outputs.is_prerelease == 'false'
        run: |
          set -euo pipefail
          cp "release-artifacts/${{ steps.meta.outputs.apk_name }}" "release-artifacts/nocts-back-on-track-latest.apk"

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          files: release-artifacts/${{ steps.meta.outputs.apk_name }}
          draft: false
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          fail_on_unmatched_files: true

      - name: Attach stable latest APK alias
        if: steps.meta.outputs.is_prerelease == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          files: release-artifacts/nocts-back-on-track-latest.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: true

      - name: Publish to F-Droid repository (Optional)
        if: vars.FDROID_AUTO_PUBLISH == 'true' && steps.meta.outputs.is_prerelease == 'false'
        env:
          FDROID_REPO_GIT: ${{ secrets.FDROID_REPO_GIT }}
          FDROID_SSH_PRIVATE_KEY: ${{ secrets.FDROID_SSH_PRIVATE_KEY }}
          VERSION: ${{ steps.meta.outputs.version }}
          APK_NAME: ${{ steps.meta.outputs.apk_name }}
        run: |
          set -euo pipefail

          echo "Preparing optional F-Droid publish"
          if [[ -z "${FDROID_REPO_GIT:-}" || -z "${FDROID_SSH_PRIVATE_KEY:-}" ]]; then
            echo "FDROID_REPO_GIT and/or FDROID_SSH_PRIVATE_KEY are not set; skipping optional publish"
            exit 0
          fi

          APK_PATH="release-artifacts/${APK_NAME}"
          if [[ ! -f "$APK_PATH" ]]; then
            echo "APK not found at $APK_PATH"
            exit 1
          fi

          sudo apt-get update
          sudo apt-get install -y git openssh-client rsync

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$FDROID_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          FDROID_HOST=$(echo "$FDROID_REPO_GIT" | sed -E 's#.*@([^:/]+).*#\1#')
          ssh-keyscan -H "$FDROID_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          git clone "$FDROID_REPO_GIT" fdroid-repo
          mkdir -p fdroid-repo/repo
          cp "$APK_PATH" "fdroid-repo/repo/nocts-back-on-track-${VERSION}.apk"

          cd fdroid-repo
          if command -v fdroid >/dev/null 2>&1 && [[ -f config.py ]]; then
            fdroid update --pretty
          else
            echo "fdroidserver or config.py not available; committing APK only"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No F-Droid repository changes to publish"
            exit 0
          fi

          git commit -m "chore(fdroid): publish ${VERSION}"
          git push

      - name: Post publish status
        if: always()
        run: |
          echo "APK Publish Status: ${{ job.status }}"
          echo "Version: ${{ steps.meta.outputs.version }}"
          echo "Channel: ${{ steps.meta.outputs.channel }}"
          echo "Commit SHA: ${{ steps.meta.outputs.tag_sha }}"
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "APK artifact published to release successfully"
          else
            echo "Publish failed. Check logs above."
          fi
