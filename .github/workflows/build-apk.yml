name: Build and Publish Mobile APK

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    name: Build APK
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'mobile/package-lock.json'

      - name: Install dependencies
        working-directory: ./mobile
        run: npm ci

      - name: Extract version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            CURRENT=$(cat version.txt 2>/dev/null || echo "1.0.0")
            IFS='.' read -r MAJOR MINOR REVISION <<< "$CURRENT"
            NEW_REVISION=$((REVISION + 1))
            VERSION="${MAJOR}.${MINOR}.${NEW_REVISION}"
            echo "$VERSION" > version.txt
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Published version: ${VERSION}"

      - name: Update app version
        working-directory: ./mobile
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Update app.json with version
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json'));
            const version = process.env.VERSION;
            const [major, minor, patch] = version.split('.').map(Number);
            app.expo.version = version;
            app.expo.android.versionCode = major * 10000 + minor * 100 + patch;
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
            console.log('✅ app.json version updated to', version);
          "
          
          # Update package.json version
          node -e "
            const fs = require('fs');
            const version = process.env.VERSION;
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.version = version;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('✅ package.json version updated to', version);
          "

      - name: Build APK (local Gradle)
        working-directory: ./mobile
        run: bash scripts/build-local-apk.sh release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.version.outputs.version }}
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Create Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        id: release
        run: |
          cat > release-notes.md << 'EOF'
          # Nocts: Back on Track v${{ steps.version.outputs.version }}
          
          ## Release Notes
          - Offline-first mobile app
          - All data stored locally on device
          - Works completely without internet
          
          ## Installation
          1. Download the APK attached to this release
          2. Transfer to your Android phone
          3. Open Settings → Security → Enable "Unknown Sources" (or "Install unknown apps")
          4. Tap the APK file to install
          
          ## Features
          - Full offline support
          - SQLite local database
          - No backend server required
          - 10-25x faster operations
          - Local password hashing (bcryptjs)
          - Data encryption for sensitive fields
          
          ## Built with
          - React Native + Expo
          - SQLite (expo-sqlite)
          - Local Gradle build (no EAS Cloud required)
          EOF
          cat release-notes.md

      - name: Create Release with Notes
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          draft: false
          files: mobile/android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Google Play Store (Optional)
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: ./mobile
        run: |
          # This requires additional setup:
          # 1. Create Google Play service account
          # 2. Add GOOGLE_PLAY_JSON_KEY_BASE64 secret
          # 3. Uncomment lines below
          
          # echo ${{ secrets.GOOGLE_PLAY_JSON_KEY_BASE64 }} | base64 -d > ./google-play-key.json
          # npx fastlane android deploy

      - name: Post build status
        if: always()
        run: |
          echo "APK Build Status: ${{ job.status }}"
          echo "Version: ${{ steps.version.outputs.version }}"
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ APK built successfully!"
            echo "📱 Download from workflow artifacts or GitHub Releases"
          else
            echo "❌ Build failed. Check logs above."
          fi