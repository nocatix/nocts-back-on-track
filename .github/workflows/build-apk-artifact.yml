name: Build Mobile APK Artifact

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk-artifact.yml'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build from (branch, tag, or SHA). Defaults to main.'
        required: false
        default: 'main'

jobs:
  build-apk-artifact:
    runs-on: ubuntu-latest
    name: Build APK Artifact

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'mobile/package-lock.json'

      - name: Install dependencies
        working-directory: ./mobile
        run: npm ci

      - name: Build APK (release)
        working-directory: ./mobile
        run: bash scripts/build-local-apk.sh release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-apk-${{ github.sha }}
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Post build status
        if: always()
        run: |
          echo "APK Build Artifact Status: ${{ job.status }}"
          echo "Artifact: mobile-apk-${{ github.sha }}"
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "APK artifact built successfully"
          else
            echo "Build failed. Check logs above."
          fi
