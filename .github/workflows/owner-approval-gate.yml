name: Owner Approval Gate

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed

jobs:
  owner-approval:
    if: github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Require owner approval for PRs to main
        uses: actions/github-script@v7
        with:
          script: |
            const ownerLogin = 'nocatix';
            const pr = context.payload.pull_request;

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            // Keep only the latest review state per reviewer.
            const latestByUser = new Map();
            for (const review of reviews) {
              if (!review.user || !review.user.login) continue;
              latestByUser.set(review.user.login.toLowerCase(), review.state);
            }

            const ownerState = latestByUser.get(ownerLogin.toLowerCase());
            const approved = ownerState === 'APPROVED';

            if (!approved) {
              core.setFailed(`PR to main requires explicit approval from @${ownerLogin}.`);
              return;
            }

            core.info(`Owner approval verified from @${ownerLogin}.`);
