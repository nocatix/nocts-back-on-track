name: Publish to GHCR

on:
  release:
    types:
      - published

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    if: github.event.release.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code at release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Validate release tag format
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          IS_PRERELEASE="${{ github.event.release.prerelease }}"

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
              echo "Invalid beta tag: $TAG"
              echo "Expected format: vX.Y.Z-beta.N"
              exit 1
            fi
          else
            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid release tag: $TAG"
              echo "Expected format: vX.Y.Z"
              exit 1
            fi
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute release channel and tags
        id: meta
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            CHANNEL="beta"
            {
              echo "backend_tags<<EOF"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${VERSION}"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:beta"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            {
              echo "frontend_tags<<EOF"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${VERSION}"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:beta"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            CHANNEL="release"
            {
              echo "backend_tags<<EOF"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${VERSION}"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            {
              echo "frontend_tags<<EOF"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${VERSION}"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.backend_tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:buildcache,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.client
          push: true
          tags: ${{ steps.meta.outputs.frontend_tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:buildcache,mode=max

      - name: Publish Summary
        run: |
          echo "## GHCR Publish Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- Channel: ${{ steps.meta.outputs.channel }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: ${{ steps.meta.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release: ${{ github.event.release.tag_name }}" >> "$GITHUB_STEP_SUMMARY"
